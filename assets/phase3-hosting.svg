<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 440" font-family="'Segoe UI', Arial, sans-serif">
  <defs>
    <marker id="a3" markerWidth="8" markerHeight="8" refX="4" refY="4" orient="auto"><path d="M0,0 L8,4 L0,8 z" fill="#8A5A2B"/></marker>
  </defs>
  <rect x="1" y="1" width="858" height="438" rx="14" fill="#F7F4EF" stroke="#DED7CB"/>
  <text x="24" y="32" font-size="15" font-weight="700" fill="#8A5A2B">Phase 3 — Hosting &amp; observability</text>
  <text x="24" y="50" font-size="10.5" fill="#6B655C">Free/off-localhost: static frontend + hardened API + Groq LLM. Every request is traced.</text>

  <!-- Frontend -->
  <rect x="280" y="66" width="300" height="56" rx="10" fill="#FCFAF6" stroke="#8A5A2B" stroke-width="1.5"/>
  <text x="430" y="88" text-anchor="middle" font-size="12.5" font-weight="700" fill="#12100E">GitHub Pages — Frontend</text>
  <text x="430" y="105" text-anchor="middle" font-size="9.5" fill="#6B655C">public/index.html · window.RAG_API_BASE</text>

  <line x1="430" y1="122" x2="430" y2="158" stroke="#8A5A2B" stroke-width="1.5" marker-end="url(#a3)"/>
  <text x="442" y="144" font-size="9" fill="#6B655C">HTTPS · CORS allowlist · rate limit · access code</text>

  <!-- Backend -->
  <rect x="150" y="158" width="560" height="104" rx="10" fill="#EBDCC8" stroke="#8A5A2B" stroke-width="1.5"/>
  <text x="430" y="180" text-anchor="middle" font-size="12.5" font-weight="700" fill="#12100E">Backend host — Express (server.js)</text>
  <rect x="168" y="192" width="180" height="56" rx="8" fill="#FCFAF6" stroke="#8A5A2B" stroke-width="1"/>
  <text x="258" y="214" text-anchor="middle" font-size="10.5" font-weight="700" fill="#12100E">Query pipeline</text>
  <text x="258" y="230" text-anchor="middle" font-size="9" fill="#6B655C">13-step RAG workflow</text>
  <rect x="358" y="192" width="150" height="56" rx="8" fill="#FCFAF6" stroke="#8A5A2B" stroke-width="1"/>
  <text x="433" y="214" text-anchor="middle" font-size="10.5" font-weight="700" fill="#12100E">Guardrails</text>
  <text x="433" y="230" text-anchor="middle" font-size="9" fill="#6B655C">input · grounding</text>
  <rect x="518" y="192" width="174" height="56" rx="8" fill="#FCFAF6" stroke="#8A5A2B" stroke-width="1"/>
  <text x="605" y="214" text-anchor="middle" font-size="10.5" font-weight="700" fill="#12100E">Observability</text>
  <text x="605" y="230" text-anchor="middle" font-size="9" fill="#6B655C">latency · tokens · cost</text>

  <!-- arrows to services -->
  <line x1="300" y1="262" x2="245" y2="316" stroke="#8A5A2B" stroke-width="1.5" marker-end="url(#a3)"/>
  <line x1="430" y1="262" x2="430" y2="316" stroke="#8A5A2B" stroke-width="1.5" marker-end="url(#a3)"/>
  <line x1="560" y1="262" x2="615" y2="316" stroke="#8A5A2B" stroke-width="1.5" marker-end="url(#a3)"/>

  <!-- Services -->
  <rect x="150" y="318" width="180" height="62" rx="10" fill="#FCFAF6" stroke="#8A5A2B" stroke-width="1.5"/>
  <text x="240" y="342" text-anchor="middle" font-size="11.5" font-weight="700" fill="#12100E">Neon pgvector</text>
  <text x="240" y="359" text-anchor="middle" font-size="9" fill="#6B655C">hybrid retrieval (free)</text>

  <rect x="340" y="318" width="180" height="62" rx="10" fill="#FCFAF6" stroke="#8A5A2B" stroke-width="1.5"/>
  <text x="430" y="342" text-anchor="middle" font-size="11.5" font-weight="700" fill="#12100E">Local models</text>
  <text x="430" y="359" text-anchor="middle" font-size="9" fill="#6B655C">embed + rerank (free)</text>

  <rect x="530" y="318" width="180" height="62" rx="10" fill="#EBDCC8" stroke="#8A5A2B" stroke-width="1.5"/>
  <text x="620" y="342" text-anchor="middle" font-size="11.5" font-weight="700" fill="#12100E">Groq — LLM</text>
  <text x="620" y="359" text-anchor="middle" font-size="9" fill="#6B655C">free tier · ~180× faster</text>

  <text x="24" y="410" font-size="9.5" fill="#6B655C">Phase 3 result: total request latency ~252s (local CPU LLM) → ~11s (Groq + tuned reranker), $0, higher answer quality.</text>
  <text x="24" y="426" font-size="9" fill="#6B655C">LLM is env-pluggable (LLM_PROVIDER): Groq free tier, any OpenAI-compatible endpoint, or fully-local Ollama.</text>
</svg>
