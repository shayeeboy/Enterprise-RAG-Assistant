<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 190" font-family="'Segoe UI', Arial, sans-serif">
  <defs>
    <marker id="a1" markerWidth="8" markerHeight="8" refX="4" refY="4" orient="auto"><path d="M0,0 L8,4 L0,8 z" fill="#8A5A2B"/></marker>
  </defs>
  <rect x="1" y="1" width="898" height="188" rx="14" fill="#F7F4EF" stroke="#DED7CB"/>
  <text x="24" y="30" font-size="14" font-weight="700" fill="#8A5A2B">Phase 1 — Ingestion pipeline</text>
  <text x="24" y="48" font-size="10.5" fill="#6B655C">Offline · free · no paid API — turns source PDFs into a queryable vector database</text>

  <!-- 6 stages -->
  <g>
    <rect x="18" y="74" width="128" height="74" rx="10" fill="#FCFAF6" stroke="#8A5A2B" stroke-width="1.5"/>
    <text x="82" y="100" text-anchor="middle" font-size="11.5" font-weight="700" fill="#12100E">Source PDFs</text>
    <text x="82" y="116" text-anchor="middle" font-size="9" fill="#6B655C">2 piano books</text>
    <text x="82" y="129" text-anchor="middle" font-size="9" fill="#6B655C">985 chunks total</text>
  </g>
  <line x1="146" y1="111" x2="162" y2="111" stroke="#8A5A2B" stroke-width="1.5" marker-end="url(#a1)"/>
  <g>
    <rect x="164" y="74" width="128" height="74" rx="10" fill="#FCFAF6" stroke="#8A5A2B" stroke-width="1.5"/>
    <text x="228" y="100" text-anchor="middle" font-size="11.5" font-weight="700" fill="#12100E">Parse</text>
    <text x="228" y="116" text-anchor="middle" font-size="9" fill="#6B655C">pdftotext -layout</text>
    <text x="228" y="129" text-anchor="middle" font-size="9" fill="#6B655C">page-numbered</text>
  </g>
  <line x1="292" y1="111" x2="308" y2="111" stroke="#8A5A2B" stroke-width="1.5" marker-end="url(#a1)"/>
  <g>
    <rect x="310" y="74" width="128" height="74" rx="10" fill="#FCFAF6" stroke="#8A5A2B" stroke-width="1.5"/>
    <text x="374" y="100" text-anchor="middle" font-size="11.5" font-weight="700" fill="#12100E">Chunk</text>
    <text x="374" y="116" text-anchor="middle" font-size="9" fill="#6B655C">+ overlap</text>
    <text x="374" y="129" text-anchor="middle" font-size="9" fill="#6B655C">context-preserving</text>
  </g>
  <line x1="438" y1="111" x2="454" y2="111" stroke="#8A5A2B" stroke-width="1.5" marker-end="url(#a1)"/>
  <g>
    <rect x="456" y="74" width="128" height="74" rx="10" fill="#FCFAF6" stroke="#8A5A2B" stroke-width="1.5"/>
    <text x="520" y="100" text-anchor="middle" font-size="11.5" font-weight="700" fill="#12100E">Metadata</text>
    <text x="520" y="116" text-anchor="middle" font-size="9" fill="#6B655C">type · skill level</text>
    <text x="520" y="129" text-anchor="middle" font-size="9" fill="#6B655C">finger numbers</text>
  </g>
  <line x1="584" y1="111" x2="600" y2="111" stroke="#8A5A2B" stroke-width="1.5" marker-end="url(#a1)"/>
  <g>
    <rect x="602" y="74" width="128" height="74" rx="10" fill="#EBDCC8" stroke="#8A5A2B" stroke-width="1.5"/>
    <text x="666" y="100" text-anchor="middle" font-size="11.5" font-weight="700" fill="#12100E">Embeddings</text>
    <text x="666" y="116" text-anchor="middle" font-size="9" fill="#6B655C">mxbai-large (local)</text>
    <text x="666" y="129" text-anchor="middle" font-size="9" fill="#6B655C">1024-dim · no key</text>
  </g>
  <line x1="730" y1="111" x2="746" y2="111" stroke="#8A5A2B" stroke-width="1.5" marker-end="url(#a1)"/>
  <g>
    <rect x="748" y="74" width="132" height="74" rx="10" fill="#EBDCC8" stroke="#8A5A2B" stroke-width="1.5"/>
    <text x="814" y="100" text-anchor="middle" font-size="11.5" font-weight="700" fill="#12100E">Neon pgvector</text>
    <text x="814" y="116" text-anchor="middle" font-size="9" fill="#6B655C">HNSW + full-text</text>
    <text x="814" y="129" text-anchor="middle" font-size="9" fill="#6B655C">index</text>
  </g>
  <text x="24" y="176" font-size="9" fill="#6B655C">Scripts: 01_parse → 02_chunk → 03_metadata → 04_embed → 05_index   (npm run build)</text>
</svg>
