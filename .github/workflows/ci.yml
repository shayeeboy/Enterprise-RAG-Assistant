name: CI

on:
  push:
  pull_request:

jobs:
  check:
    name: Wiring + logic (offline)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run check

  smoke:
    name: Full smoke (DB + models)
    needs: check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Only run the full smoke test if a DATABASE_URL secret is configured.
      # (Add it under Settings → Secrets and variables → Actions.)
      - id: guard
        env:
          DB: ${{ secrets.DATABASE_URL }}
          LLM: ${{ secrets.LLM_API_KEY }}
        run: |
          if [ -n "$DB" ]; then
            echo "run=true" >> "$GITHUB_OUTPUT"
          else
            echo "run=false" >> "$GITHUB_OUTPUT"
            echo "No DATABASE_URL secret set — skipping full smoke (offline check already passed)."
          fi
          # The LLM-judge (Phase 4) additionally needs an LLM key.
          if [ -n "$DB" ] && [ -n "$LLM" ]; then
            echo "judge=true" >> "$GITHUB_OUTPUT"
          else
            echo "judge=false" >> "$GITHUB_OUTPUT"
            echo "No LLM_API_KEY secret set — skipping LLM-judge eval."
          fi

      - uses: actions/setup-node@v4
        if: steps.guard.outputs.run == 'true'
        with:
          node-version: 20
          cache: npm

      - run: npm ci
        if: steps.guard.outputs.run == 'true'

      # Downloads the embedding + reranker models on first run. No Ollama in CI,
      # so the LLM check warns (non-fatal); DB, embedding, retrieval and rerank
      # are all exercised against the live Neon database.
      - run: npm run smoke
        if: steps.guard.outputs.run == 'true'
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      # Retrieval-quality acceptance (Hit@5 / MRR). The refusal check needs an
      # LLM and is skipped in CI; Hit@5 must still clear its target.
      - run: npm run eval
        if: steps.guard.outputs.run == 'true'
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      # Phase 4 — deterministic LLM-judge (faithfulness / answer-correctness /
      # semantic Hit@5). Runs only when an LLM_API_KEY secret is present; uses
      # the same free-tier provider as production, so it costs $0.
      - run: npm run eval:judge
        if: steps.guard.outputs.judge == 'true'
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          LLM_PROVIDER: openai-compatible
          LLM_BASE_URL: https://api.groq.com/openai/v1
          LLM_MODEL: llama-3.3-70b-versatile
          JUDGE_MODEL: openai/gpt-oss-120b
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
