name: Deploy frontend to Pages

# Publishes the static chat UI (public/) to GitHub Pages. The page calls the
# backend via a ?api=<backend-url> query param (see public/index.html), so no
# build-time backend URL is needed.
on:
  push:
    branches: [main]
    paths:
      - "public/**"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: public
      - id: deployment
        uses: actions/deploy-pages@v4
